name: Sync Release Assets to R2

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Download release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir assets
          gh release download "${{ github.event.release.tag_name }}" \
            --repo timqian/lean4.js \
            --dir assets

      - name: Upload to R2
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          command: r2 object put lean4-wasm/${{ github.event.release.tag_name }}/lean.js --file assets/lean.js

      - name: Upload lean.wasm to R2
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          command: r2 object put lean4-wasm/${{ github.event.release.tag_name }}/lean.wasm --file assets/lean.wasm

      - name: Upload lean-lib.tar.gz to R2
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          command: r2 object put lean4-wasm/${{ github.event.release.tag_name }}/lean-lib.tar.gz --file assets/lean-lib.tar.gz
